name: Post-Merge Self Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      fail-on-high:
        description: Fail if bandit finds HIGH severity issues
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[sarif]

      - name: Run bandit
        run: |
          bandit -r mcpsafetywarden \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            -q || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload bandit report artifact
        uses: actions/upload-artifact@v7
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 90

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e "." --quiet

      - name: Version check
        run: mcpsafetywarden --version

      - name: Help check
        run: mcpsafetywarden --help
