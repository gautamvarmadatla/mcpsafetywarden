name: Post-Merge Self Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      fail-on-high:
        description: Fail if bandit finds HIGH severity issues
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[sarif]

      - name: Run bandit
        run: |
          bandit -r mcpsafetywarden \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --skip B608 \
            -q || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload bandit report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 90

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e "." --quiet

      - name: Version check
        run: mcpsafetywarden --version

      - name: Help check
        run: mcpsafetywarden --help
