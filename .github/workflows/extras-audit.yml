name: Extras Dependency Audit

on:
  pull_request:
    paths:
      - pyproject.toml
      - .github/workflows/extras-audit.yml
  schedule:
    - cron: "0 8 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-extras:
    name: Audit extras (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: llm-providers
            extras: "anthropic openai gemini"
          - name: security-tools
            extras: "cisco snyk"
          - name: research-source
            extras: "research source"
          - name: encryption
            extras: "encryption"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install selected extras
        run: |
          for extra in ${{ matrix.extras }}; do
            pip install -e ".[$extra]" --quiet
          done

      - name: Audit with pip-audit
        run: |
          pip install pip-audit --quiet
          mkdir -p audit
          pip-audit --format json --output "audit/${{ matrix.name }}-pip-audit.json" || true
          pip-audit --format cyclonedx-json --output "audit/${{ matrix.name }}-sbom.json" || true

      - name: Upload audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extras-audit-${{ matrix.name }}
          path: audit/
          retention-days: 30
