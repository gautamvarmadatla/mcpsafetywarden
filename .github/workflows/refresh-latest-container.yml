name: Refresh Latest Container

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  refresh-latest:
    name: Rebuild and push latest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Find latest release tag
        id: tag
        run: |
          git ls-remote --tags --sort=-v:refname https://github.com/${{ github.repository }}.git 'refs/tags/v*' \
            | grep -v '\^{}' | head -1 | sed 's|.*refs/tags/||' | xargs -I{} echo "tag={}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Build candidate image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: mcpsafetywarden:refresh-candidate
          build-args: PKG_SPEC=mcpsafetywarden[all]==${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm mcpsafetywarden:refresh-candidate mcpsafetywarden --version

      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          image-ref: mcpsafetywarden:refresh-candidate
          format: table
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "1"

      - name: Push refreshed latest to GHCR and Docker Hub
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mcpsafetywarden:latest
          build-args: PKG_SPEC=mcpsafetywarden[all]==${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
