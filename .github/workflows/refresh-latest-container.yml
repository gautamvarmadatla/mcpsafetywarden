name: Refresh Latest Container

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  refresh-latest:
    name: Rebuild and push latest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Find latest release tag
        id: tag
        run: |
          git ls-remote --tags --sort=-v:refname https://github.com/${{ github.repository }}.git 'refs/tags/v*' \
            | grep -v '\^{}' | head -1 | sed 's|.*refs/tags/||' | xargs -I{} echo "tag={}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Build candidate image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mcpsafetywarden:refresh-candidate
          build-args: PKG_SPEC=mcpsafetywarden[all]==${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm mcpsafetywarden:refresh-candidate mcpsafetywarden --version

      - name: Trivy vulnerability gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcpsafetywarden:refresh-candidate
          format: table
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "1"

      - name: Push refreshed latest
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: PKG_SPEC=mcpsafetywarden[all]==${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
