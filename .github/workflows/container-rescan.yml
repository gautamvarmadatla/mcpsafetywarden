name: Container Re-Scan

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  rescan:
    name: Rescan — ${{ matrix.registry }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        registry: [ghcr, dockerhub]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        if: matrix.registry == 'ghcr'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: matrix.registry == 'dockerhub'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image ref
        id: image
        run: |
          if [ "${{ matrix.registry }}" = "ghcr" ]; then
            echo "ref=ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ secrets.DOCKERHUB_USERNAME }}/mcpsafetywarden:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull image
        run: docker pull ${{ steps.image.outputs.ref }}

      - name: Trivy scan (table)
        id: scan_table
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: table
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "1"
        continue-on-error: true

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: sarif
          output: image-scan-${{ matrix.registry }}.sarif
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "0"
        continue-on-error: true

      - name: Upload SARIF to Security tab
        if: always() && hashFiles(format('image-scan-{0}.sarif', matrix.registry)) != ''
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: image-scan-${{ matrix.registry }}.sarif
          category: container-${{ matrix.registry }}

      - name: Open or close CVE issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          TITLE="base-image-vulnerability: ${IMAGE_REF} has fixable CVEs"
          gh label create base-image-vulnerability --color B60205 --description "Fixable CVE in published Docker image" 2>/dev/null || true
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ "${{ steps.scan_table.outcome }}" = "failure" ]; then
            if [ -z "$EXISTING" ]; then
              gh issue create --title "$TITLE" \
                --label base-image-vulnerability \
                --body "The daily Trivy rescan found fixable MEDIUM+/UNKNOWN CVEs in \`${IMAGE_REF}\`. Run the **Refresh Latest Container** workflow to rebuild from the current base image."
            fi
          elif [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "Daily rescan is clean - closing automated CVE alert."
          fi
