name: Container Re-Scan

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  rescan:
    name: Rescan image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Trivy scan (table)
        id: scan_table
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: table
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "1"
        continue-on-error: true

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: image-scan.sarif
          severity: MEDIUM,HIGH,CRITICAL,UNKNOWN
          ignore-unfixed: true
          exit-code: "0"
        continue-on-error: true

      - name: Upload SARIF to Security tab
        if: always() && hashFiles('image-scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: image-scan.sarif
          category: container

      - name: Open or close CVE issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="base-image-vulnerability: ghcr.io/${{ github.repository }}:latest has fixable CVEs"
          gh label create base-image-vulnerability --color B60205 --description "Fixable CVE in published Docker image" 2>/dev/null || true
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ "${{ steps.scan_table.outcome }}" = "failure" ]; then
            if [ -z "$EXISTING" ]; then
              gh issue create --title "$TITLE" \
                --label base-image-vulnerability \
                --body "The daily Trivy rescan found fixable MEDIUM+/UNKNOWN CVEs in \`ghcr.io/${{ github.repository }}:latest\`. Run the **Refresh Latest Container** workflow to rebuild from the current base image."
            fi
          elif [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "Daily rescan is clean - closing automated CVE alert."
          fi
