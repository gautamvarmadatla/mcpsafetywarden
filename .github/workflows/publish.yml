name: Publish

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "20"

      - name: Build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  publish-registry:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set version in server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Wait for PyPI indexing
        run: sleep 30

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github --token ${{ secrets.MCP_GITHUB_TOKEN }}

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  create-release:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Build and sign
        run: |
          pip install build sigstore
          python -m build
          sigstore sign dist/*.whl dist/*.tar.gz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          NOTES=$(git tag -l --format='%(contents)' "$TAG" | sed '/^-----BEGIN SSH SIGNATURE-----/,/^-----END SSH SIGNATURE-----/d' | sed '/^-----BEGIN PGP SIGNATURE-----/,/^-----END PGP SIGNATURE-----/d')
          PREV_TAG=$(gh release list --limit 2 --json tagName -q '.[1].tagName' 2>/dev/null || echo "")
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            [ -n "$PREV_TAG" ] && NOTES="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          if [ -n "$PREV_TAG" ]; then
            LOGINS=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" \
              --jq '[.commits[].author | select(. != null) | .login] | unique | .[]' 2>/dev/null || echo "")
          else
            LOGINS=$(gh api "repos/${{ github.repository }}/commits?per_page=100" \
              --jq '[.[].author | select(. != null) | .login] | unique | .[]' 2>/dev/null || echo "")
          fi

          if [ -n "$LOGINS" ]; then
            AVATARS=""
            while IFS= read -r login; do
              [ -z "$login" ] && continue
              USER_ID=$(gh api "users/$login" --jq '.id' 2>/dev/null || echo "")
              [ -n "$USER_ID" ] && AVATARS+="[![@${login}](https://avatars.githubusercontent.com/u/${USER_ID}?s=64&v=4)](https://github.com/${login}) "
            done <<< "$LOGINS"
            [ -n "$AVATARS" ] && NOTES+=$'\n\n## Contributors\n\n'"$AVATARS"
          fi

          gh release create "$TAG" dist/* --notes "$NOTES" --title "$TAG"

  publish-docker:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          for i in $(seq 1 24); do
            if pip index versions mcpsafetywarden 2>/dev/null | grep -q "$VERSION"; then
              echo "mcpsafetywarden==$VERSION available on PyPI"; exit 0
            fi
            echo "Attempt $i: not yet indexed, waiting 30s..."
            sleep 30
          done
          echo "Timed out waiting for PyPI" && exit 1

      - name: Build and push to GHCR and Docker Hub
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          build-args: PKG_SPEC=mcpsafetywarden[all]==${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mcpsafetywarden:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mcpsafetywarden:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
