name: Update Badges

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  update-docker-pulls:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Fetch Docker Hub pull count
        id: pulls
        run: |
          COUNT=$(curl -s https://hub.docker.com/v2/repositories/gautamdatla1999/mcpsafetywarden/ | jq -r '.pull_count')
          if [ "$COUNT" -ge 1000000 ]; then
            MSG="$(echo "scale=1; $COUNT / 1000000" | bc)M"
          elif [ "$COUNT" -ge 1000 ]; then
            MSG="$(echo "scale=1; $COUNT / 1000" | bc)k"
          else
            MSG="$COUNT"
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "message=$MSG" >> "$GITHUB_OUTPUT"

      - name: Update Gist
        env:
          GIST_TOKEN: ${{ secrets.BADGE_GIST_TOKEN }}
          GIST_ID: ${{ secrets.BADGE_GIST_ID }}
        run: |
          PAYLOAD=$(jq -n \
            --arg msg "${{ steps.pulls.outputs.message }}" \
            '{"schemaVersion":1,"label":"docker pulls","message":$msg,"color":"blue","cacheSeconds":300}')
          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"mcpsafetywarden_docker.json\":{\"content\":$(echo $PAYLOAD | jq -Rs .)}}}" \
            "https://api.github.com/gists/$GIST_ID"
