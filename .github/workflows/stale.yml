name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for 60 days. It will be closed in 14 days unless there
            is new activity.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has had
            no activity for 30 days. Please rebase and update if you intend to
            continue.
          close-issue-message: >
            This issue was closed automatically after 14 days of inactivity
            following the stale label being applied.
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: -1
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
